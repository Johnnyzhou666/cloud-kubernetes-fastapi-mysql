---
# Production Database Pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      nodeSelector:
        env: db-node # Strictly schedule to Worker Node 3
      containers:
      - name: database
        image: postgres:13
        ports:
        - containerPort: 5432

---
# Internal Database Service
apiVersion: v1
kind: Service
metadata:
  name: db-service-prod
spec:
  selector:
    app: db
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 5432

---
# Production Web Server Pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      # Pod Anti-Affinity ensures active-active HA by preventing scheduling on the same node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - nginx
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: web-app
        image: your-gcr-repo/python-web-app:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "db-service-prod"

---
# External LoadBalancer Service
apiVersion: v1
kind: Service
metadata:
  name: nginx-service-prod
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
